name: "Reusable TagBot Workflow"

on:
  workflow_call:
    inputs:
      subdirs:
        description: "JSON array of subdir package names, e.g. '[\"NDTensors\"]'"
        required: false
        default: "[]"
        type: "string"
    secrets:
      TAGBOT_PAT:
        required: false

jobs:
  TagBotITensorRegistry:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write"
    steps:
      - uses: "JuliaRegistries/TagBot@v1"
        with:
          token: "${{ secrets.TAGBOT_PAT || github.token }}"
          registry: "ITensor/ITensorRegistry"
  TagBotGeneral:
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write"
    steps:
      - uses: "JuliaRegistries/TagBot@v1"
        with:
          token: "${{ secrets.TAGBOT_PAT || github.token }}"
  TagBotGeneralSubdirs:
    if: "${{ inputs.subdirs != '[]' }}"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write"
    strategy:
      fail-fast: false
      matrix:
        subdir: "${{ fromJSON(inputs.subdirs) }}"
    steps:
      - uses: "ITensor/ITensorActions/.github/actions/tag-subdir@6e32670d8a3a060aa9d970c0ace64331d1f1263d"
        with:
          subdir: "${{ matrix.subdir }}"
          token: "${{ secrets.TAGBOT_PAT || github.token }}"
