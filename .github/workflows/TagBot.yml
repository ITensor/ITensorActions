name: "Reusable TagBot Workflow"

on:
  workflow_call:
    secrets:
      TAGBOT_PAT:
        required: false

jobs:
  TagBotITensorRegistry:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "JuliaRegistries/TagBot@v1"
        with:
          token: "${{ secrets.TAGBOT_PAT || github.token }}"
          registry: "ITensor/ITensorRegistry"
  TagBotGeneral:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "JuliaRegistries/TagBot@v1"
        with:
          token: "${{ secrets.TAGBOT_PAT || github.token }}"
