name: "Reusable IntegrationTest Workflow"

on:
  workflow_call:
    inputs:
      julia-version:
        description: "Julia version"
        default: "1"
        required: false
        type: string
      pkg:
        description: "Package name without `.jl` (e.g. ITensors for ITensors.jl), or a URL (https/git@) for private or unregistered packages."
        required: true
        type: string
      localregistry:
        description: "Add local registries hosted on GitHub. Specified by providing the url (https/ssh) to the repositories as a newline (\n) seperated list. User is responsible for setting up the necessary SSH-Keys to access the repositories if necessary."
        default: ""
        required: false
        type: string
      run-on-draft:
        description: "When true, run integration tests even on draft PRs"
        default: false
        required: false
        type: boolean
      is-fork-pr:
        description: "When true, skip URL-based (private/unregistered) packages and post a notification comment instead. Callers should set this to the result of comparing PR head and base repo names."
        default: false
        required: false
        type: boolean
    secrets:
      TAGBOT_PAT:
        description: "GitHub PAT for cloning private repositories via HTTPS."
        required: false

jobs:
  test:
    name: ${{ inputs.pkg }}
    if: "!github.event.pull_request.draft || inputs.run-on-draft"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: "Check if private downstream test should be skipped"
        id: skip-check
        run: |
          pkg="${{ inputs.pkg }}"
          is_fork="${{ inputs.is-fork-pr }}"
          if [[ "$is_fork" == "true" ]] && { [[ "$pkg" == https://* ]] || [[ "$pkg" == git@* ]]; }; then
            echo "should-skip=true" >> $GITHUB_OUTPUT
            # Derive a comment tag from the full URL for deduplication
            tag="integration-skip-$(echo "$pkg" | sed 's|[^a-zA-Z0-9]|-|g')"
            echo "comment-tag=$tag" >> $GITHUB_OUTPUT
          else
            echo "should-skip=false" >> $GITHUB_OUTPUT
          fi

      - name: "Find existing skip notification comment"
        if: steps.skip-check.outputs.should-skip == 'true'
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- ${{ steps.skip-check.outputs.comment-tag }} -->"

      - name: "Post skip notification comment"
        if: steps.skip-check.outputs.should-skip == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- ${{ steps.skip-check.outputs.comment-tag }} -->
            Private downstream test for `${{ inputs.pkg }}` was skipped (PR was made from a fork). A maintainer can run:
            ```
            /integrationtest ${{ inputs.pkg }}
            ```
          edit-mode: replace

      - name: "Private downstream test skipped (fork PR)"
        if: steps.skip-check.outputs.should-skip == 'true'
        run: echo "Skipped — PR was made from a fork. Use /integrationtest to trigger manually."

      - name: "No downstream packages configured"
        if: inputs.pkg == '__none__' && steps.skip-check.outputs.should-skip != 'true'
        run: echo "No downstream integration tests configured."
      - uses: actions/checkout@v4
        if: inputs.pkg != '__none__' && steps.skip-check.outputs.should-skip != 'true'
      - uses: julia-actions/setup-julia@v2
        if: inputs.pkg != '__none__' && steps.skip-check.outputs.should-skip != 'true'
        with:
          version: ${{ inputs.julia-version }}
          arch: x64
      - uses: julia-actions/julia-buildpkg@latest
        if: inputs.pkg != '__none__' && steps.skip-check.outputs.should-skip != 'true'
        with:
          localregistry: "${{ inputs.localregistry }}"
      - name: "Configure git authentication for private repository"
        if: inputs.pkg != '__none__' && steps.skip-check.outputs.should-skip != 'true'
        env:
          TOKEN: ${{ secrets.TAGBOT_PAT }}
        run: |
          pkg="${{ inputs.pkg }}"
          if [[ "$pkg" == https://* ]] || [[ "$pkg" == git@* ]]; then
            if [ -n "$TOKEN" ]; then
              git config --global url."https://x-access-token:${TOKEN}@github.com/".insteadOf "https://github.com/"
            fi
          fi
      - name: Run the downstream tests
        if: inputs.pkg != '__none__' && steps.skip-check.outputs.should-skip != 'true'
        shell: julia --color=yes --project=downstream {0}
        run: |
          using Pkg
          # If provided add local registries
          if !isempty("${{ inputs.localregistry }}")
            registry_urls = split("${{ inputs.localregistry }}", "\n") .|> string
            for registry_url in registry_urls
              isempty(registry_url) && continue
              Pkg.Registry.add(Pkg.RegistrySpec(; url=registry_url))
            end
          end
          pkg = "${{ inputs.pkg }}"
          if startswith(pkg, "https://") || startswith(pkg, "git@")
            # URL: unregistered or private package, skip version-pinning.
            pkg_name = replace(basename(pkg), r"\.jl$" => "")
            Pkg.add(PackageSpec(; url=pkg))
            Pkg.develop(PackageSpec(; path="."))
            Pkg.update()
            Pkg.test(PackageSpec(; name=pkg_name))
          else
            try
              Pkg.add(PackageSpec(; name=pkg))
              # Determine the version that gets installed in order to detect
              # if the package is forced to downgrade.
              eval(Expr(:using, :($(Expr(:., Symbol(pkg))))))
              version = pkgversion(eval(Symbol(pkg)))
              # force it to use this PR's version of the package
              Pkg.develop(PackageSpec(; path="."))  # resolver may fail with main deps
              Pkg.update()
              # Try forcing the installation of the package at the latest version
              # to see if there is a compatibility issue.
              Pkg.add(PackageSpec(; name=pkg, version=version))
              Pkg.test(PackageSpec(; name=pkg))  # resolver may fail with test time deps
            catch err
              err isa Pkg.Resolve.ResolverError || rethrow()
              # If we can't resolve that means this is incompatible by SemVer and this is fine
              # It means we marked this as a breaking change, so we don't need to worry about
              # Mistakenly introducing a breaking change, as we have intentionally made one
              @info "Not compatible with this release. No problem." exception=err
              exit(0)  # Exit immediately, as a success
            end
          end
