name: "Documentation"

on:
  workflow_call:
    inputs:
      debug-documenter:
        description: "Run julia with JULIA_DEBUG set to 'Documenter'"
        default: false
        required: false
        type: boolean
      github-token:
        description: "The GitHub token required for authentication with the ssh deploy key"
        required: false
        type: string
      julia-version:
        description: "Julia version"
        default: "1"
        required: false
        type: string
      localregistry:
        type: string
        required: false
        description: 'Add local registries hosted on GitHub. Specified by providing the url (https/ssh) to the repositories as a newline (\n) seperated list. User is responsible for setting up the necessary SSH-Keys to access the repositories if necessary.'
        default: ''
      self-hosted:
        description: "Run the job needs on a self hosted machine"
        default: false
        required: false
        type: boolean
      os:
        description: "The machine configuration on which the job needs to be run"
        default: "ubuntu-latest"
        required: false
        type: string
      cache:
        description: "Use the julia-actions/cache action for caching"
        default: true
        required: false
        type: boolean
      coverage:
        description: "Collect and generate code coverage-related information"
        default: true
        required: false
        type: boolean
      coverage-directories:
        description: "Comma-separated list of directories where the julia-processcoverage action will look for coverage information (e.g. `src,examples`)"
        default: "src,ext"
        required: false
        type: string
      continue-on-error:
        description: "Prevent the workflow run from failing if/when the job fails"
        required: false
        type: boolean
      apt-packages:
        description: "Space-separated list of apt packages to install on Ubuntu runners before Julia setup (e.g. 'xvfb libgl1' for GUI-dependent documentation builds). Ignored on non-Linux runners."
        default: ""
        required: false
        type: string
      doc-prefix:
        description: "Value prepended to each julia invocation in the workflow (both the project-setup step and the docs build step). Example: 'xvfb-run -a -s \"-screen 0 1024x768x24\" ' for packages whose precompile workload requires a display."
        default: ""
        required: false
        type: string
      extra-env:
        description: "Multi-line KEY=VALUE pairs to export into the job's environment (via $GITHUB_ENV) before the setup and build steps."
        default: ""
        required: false
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  documentation:
    name: "Documentation"
    continue-on-error: ${{ inputs.continue-on-error || inputs.julia-version == 'nightly' }}
    runs-on: "${{ inputs.self-hosted && 'self-hosted' || inputs.os }}"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: "Install apt packages"
        if: "${{ inputs.apt-packages != '' && runner.os == 'Linux' }}"
        env:
          APT_PACKAGES: ${{ inputs.apt-packages }}
        run: |
          sudo apt-get update
          # shellcheck disable=SC2086
          sudo apt-get install -y $APT_PACKAGES

      - name: "Setup Julia ${{ inputs.julia-version }}"
        uses: julia-actions/setup-julia@v2
        with:
          version: "${{ inputs.julia-version }}"

      - uses: julia-actions/cache@v2
        if: "${{ inputs.cache }}"
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Export extra environment variables"
        if: "${{ inputs.extra-env != '' }}"
        shell: "bash"
        env:
          EXTRA_ENV: ${{ inputs.extra-env }}
        run: |
          printf '%s\n' "$EXTRA_ENV" >> "$GITHUB_ENV"

      - name: Setup project
        shell: "bash"
        env:
          LOCALREGISTRY: ${{ inputs.localregistry }}
        # `doc-prefix` is rendered directly into the script body so that any
        # shell quoting in the caller's value (e.g. the single-quoted server
        # args of `xvfb-run -a -s '-screen 0 1024x768x24'`) is parsed by the
        # shell with normal quoting rules. Routing it through a `$DOC_PREFIX`
        # env-var would word-split the literal characters of the value
        # (including any embedded `'`/`"`/`&`/`;`) instead, breaking commands
        # like xvfb-run that take a quoted multi-word arg. The audit's
        # env-mapping pattern is for protecting against untrusted
        # user-controlled input; reusable-workflow inputs come from the
        # trusted caller workflow file, so direct substitution is fine here.
        run: |
          ${{ inputs.doc-prefix }}julia --project=docs --color=yes <<'EOF'
          import Pkg
          if VERSION >= v"1.8-"
            Pkg.Registry.add()
          else
            Pkg.Registry.add("General")
          end
          localregistry = get(ENV, "LOCALREGISTRY", "")
          if !isempty(localregistry)
            local_repos = split(localregistry, "\n") .|> string
            for repo_url in local_repos
              isempty(repo_url) && continue
              Pkg.Registry.add(Pkg.RegistrySpec(; url=repo_url))
            end
          end
          Pkg.develop(Pkg.PackageSpec(path=pwd()))
          retry(Pkg.build)(verbose=true)
          EOF
      - name: "Build and Deploy Documentation"
        env:
          GITHUB_TOKEN: ${{ inputs.github-token || secrets.GITHUB_TOKEN }}
          JULIA_DEBUG: ${{ inputs.debug-documenter && 'Documenter' || '' }}
          COVERAGE_FLAG: ${{ inputs.coverage && '--code-coverage=user' || '' }}
        # `doc-prefix` is rendered directly here — see the rationale on the
        # "Setup project" step above.
        run: ${{ inputs.doc-prefix }}julia --project=docs/ $COVERAGE_FLAG docs/make.jl

      - uses: julia-actions/julia-processcoverage@v1
        if: "${{ inputs.coverage }}"
        with:
          directories: "${{ inputs.coverage-directories }}"

      - name: "Report Coverage with Codecov"
        uses: codecov/codecov-action@v5
        if: "${{ inputs.coverage }}"
        with:
          files: lcov.info
          flags: "docs"
          token: "${{ secrets.CODECOV_TOKEN }}"
          fail_ci_if_error: false
