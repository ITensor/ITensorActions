name: "Registrator"

on:
  workflow_call:
    inputs:
      julia-version:
        description: "Julia version"
        required: false
        default: "1"
        type: string
      localregistry:
        description: "Local registry repo (owner/name) used when the package is not in General."
        required: false
        default: ""
        type: string
      trigger:
        description: "Comment trigger phrase for on-demand registration"
        default: "/register"
        required: false
        type: string
      subdir:
        description: "Subdirectory containing the package's Project.toml, relative to the repo root. Default empty means register the root package. Set to e.g. 'NDTensors' to register an in-tree subpackage; the workflow then reads `package/<subdir>/Project.toml` and posts `@JuliaRegistrator register subdir=<subdir>` so JuliaRegistrator picks up the sub-package correctly."
        default: ""
        required: false
        type: string
    secrets:
      # Only needed for the local-registry path (checkout + PR). Not needed for General.
      REGISTRATOR_PAT:
        required: false

jobs:
  registrator:
    name: "Registrator"
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' || (
        github.event.issue.pull_request == null &&
        contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association) &&
        contains(github.event.comment.body, inputs.trigger)
      )

    # Writes (commit comment for General path, registry PR for local
    # path, comment reaction) all use REGISTRATOR_PAT, so this job
    # itself only needs read scope on the GITHUB_TOKEN. The PAT bypasses
    # GITHUB_TOKEN's permissions for the actual write operations.
    permissions:
      contents: read
      pull-requests: read

    env:
      # Prefer the commit that landed on the base branch when available (merged PRs),
      # otherwise PR head SHA, otherwise github.sha.
      TARGET_SHA: ${{ (github.event.pull_request && github.event.pull_request.merged && github.event.pull_request.merge_commit_sha) || (github.event.pull_request && github.event.pull_request.head.sha) || github.sha }}

    steps:
      - name: "Get target SHA from comment"
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TRIGGER: ${{ inputs.trigger }}
        run: |
          BODY=$(jq -r '.comment.body' "$GITHUB_EVENT_PATH")
          SHA=$(printf '%s' "$BODY" | grep -oP "${TRIGGER}"'\s+\K[0-9a-f]{7,40}' | head -1 || true)
          if [ -n "$SHA" ]; then
            FULL_SHA=$(gh api "repos/$REPO/commits/$SHA" --jq '.sha')
            echo "TARGET_SHA=$FULL_SHA" >> "$GITHUB_ENV"
          fi

      - name: "Setup Julia ${{ inputs.julia-version }}"
        uses: julia-actions/setup-julia@v3
        with:
          version: "${{ inputs.julia-version }}"
          arch: ${{ runner.arch }}

      - uses: julia-actions/cache@v2
        with:
          delete-old-caches: false

      - name: "Checkout package"
        uses: actions/checkout@v6
        with:
          path: package
          fetch-depth: 0
          ref: ${{ env.TARGET_SHA }}

      - name: "Decide route (General vs local) + validate version bump"
        id: meta
        env:
          OLD_REF: ${{ github.event.before }}
          SUBDIR: ${{ inputs.subdir }}
        shell: julia --color=yes {0}
        run: |
          using TOML
          import Pkg

          function parse_version(s::AbstractString, label::AbstractString)
              try
                  return VersionNumber(s)
              catch err
                  error("Invalid $label version '$s' in Project.toml: $err")
              end
          end

          # Keep `valid_bump` in sync with the copy in VersionCheck.yml — the two
          # workflows share the same bump-shape rules but cannot share Julia code
          # across reusable workflow YAML without a heavier composite-action setup.
          function valid_bump(o::VersionNumber, n::VersionNumber)
              # Strip-suffix release transition: same M.m.p, old had pre-release, new doesn't.
              if n.major == o.major && n.minor == o.minor && n.patch == o.patch &&
                 !isempty(o.prerelease) && isempty(n.prerelease)
                  return true, "stripping pre-release suffix"
              end
              # Only called when n > o
              if n.major == o.major && n.minor == o.minor
                  return (n.patch == o.patch + 1), "expected patch bump by 1"
              elseif n.major == o.major
                  return (n.minor == o.minor + 1 && n.patch == 0), "expected minor bump by 1 with patch reset to 0"
              else
                  return (n.major == o.major + 1 && n.minor == 0 && n.patch == 0), "expected major bump by 1 with minor/patch reset to 0"
              end
          end

          # Resolve the registration route ("general" if the package's UUID is
          # already in the General registry, "local" otherwise).
          function register_route(uuid)
              ENV["JULIA_PKG_SERVER"] = ""
              Pkg.Registry.add("General")
              general_toml = joinpath(first(DEPOT_PATH), "registries", "General", "Registry.toml")
              general = TOML.parsefile(general_toml)
              return haskey(get(general, "packages", Dict{String,Any}()), uuid) ? "general" : "local"
          end

          # Walk the git history of `project_path` on the current ref and return
          # the most recent VersionNumber whose `prerelease` is empty (i.e., the
          # most recent actually-released version), or `nothing` if there is none.
          function find_last_released_version(repo_path, project_path)
              log_output = try
                  readlines(`git -C $repo_path log --pretty=%H HEAD -- $project_path`)
              catch
                  return nothing
              end
              for sha in log_output
                  try
                      toml_text = read(`git -C $repo_path show $sha:$project_path`, String)
                      v_str = get(TOML.parse(toml_text), "version", "")
                      isempty(v_str) && continue
                      v = VersionNumber(v_str)
                      if isempty(v.prerelease)
                          return v
                      end
                  catch
                      continue
                  end
              end
              return nothing
          end

          let
              subdir = get(ENV, "SUBDIR", "")
              project_path = isempty(subdir) ? "Project.toml" : joinpath(subdir, "Project.toml")

              new = TOML.parsefile(joinpath("package", project_path))
              name = get(new, "name", "")
              uuid = get(new, "uuid", "")
              newv_str = get(new, "version", "")

              isempty(name) && error("$project_path is missing name")
              isempty(uuid) && error("$project_path is missing uuid")
              isempty(newv_str) && error("$project_path is missing version")

              newv = parse_version(newv_str, "new")
              subject = replace(readchomp(`git -C package log -1 --pretty=%s HEAD`), ['\n','\r'] => ' ')

              # Determine previous ref
              old_ref = get(ENV, "OLD_REF", "")
              if isempty(old_ref) || old_ref == "0000000000000000000000000000000000000000"
                  try
                      old_ref = readchomp(`git -C package rev-parse HEAD^`)
                  catch
                      old_ref = ""
                  end
              end

              oldv_str = ""
              if !isempty(old_ref)
                  try
                      old_toml = readchomp(`git -C package show $old_ref:$project_path`)
                      oldv_str = get(TOML.parse(old_toml), "version", "")
                  catch err
                      # Don't hard-fail on missing old Project.toml; just skip strict validation.
                      println(stderr, "Warning: could not read $project_path at ref '$old_ref' (treating as no prior version): $err")
                      oldv_str = ""
                  end
              end

              # For issue_comment events, always attempt registration (skip version-change guards).
              is_force = get(ENV, "GITHUB_EVENT_NAME", "") == "issue_comment"

              # Parse old version once up front; used by both the pre-release skip
              # branch (for shape validation) and the normal registration branch.
              oldv = isempty(oldv_str) ? nothing : parse_version(oldv_str, "old")

              route = "none"
              is_breaking = false
              skip_reason = ""

              # Skip registration entirely while the version carries a pre-release
              # suffix (e.g., "0.22.0-DEV"): the package is accumulating breaking
              # changes toward an eventual release. The release PR strips the
              # suffix and is registered normally. is_force (manual /register)
              # bypasses this and registers the pre-release version. Even on the
              # skip path, validate the bump shape when entering pre-release mode
              # so a malformed transition (e.g., 0.21.5 -> 0.99.0-DEV) is caught.
              if !isempty(newv.prerelease) && !is_force
                  if oldv !== nothing && newv > oldv
                      ok, why = valid_bump(oldv, newv)
                      ok || error("Invalid version bump: $oldv_str -> $newv_str ($why)")
                  end
                  skip_reason = "pre-release version $newv_str; not registering during accumulation"
              elseif oldv !== nothing
                  if newv == oldv && !is_force
                      skip_reason = "Project.toml version unchanged ($newv_str)"
                  elseif newv < oldv && !is_force
                      skip_reason = "Project.toml version decreased ($oldv_str -> $newv_str); skipping registration"
                  else
                      if newv > oldv
                          ok, why = valid_bump(oldv, newv)
                          is_force || ok || error("Invalid version bump: $oldv_str -> $newv_str ($why)")

                          # When transitioning out of pre-release (strip-suffix release PR),
                          # compare against the last actually-released version on this
                          # branch's history rather than the previous (pre-release) commit
                          # which would mis-classify the release as non-breaking.
                          oldv_compare = if !isempty(oldv.prerelease) && isempty(newv.prerelease)
                              something(find_last_released_version("package", project_path), oldv)
                          else
                              oldv
                          end
                          # Breaking if: major bump OR (0.x) minor bump
                          is_breaking = (newv.major > oldv_compare.major) ||
                                        (oldv_compare.major == 0 && newv.major == 0 && newv.minor > oldv_compare.minor)
                      end

                      route = register_route(uuid)
                  end
              else
                  # No prior version found to compare against; proceed to route decision.
                  route = register_route(uuid)
              end

              open(ENV["GITHUB_OUTPUT"], "a") do io
                  println(io, "route=$route")
                  println(io, "pkg_name=$name")
                  println(io, "uuid=$uuid")
                  println(io, "new_version=$newv_str")
                  println(io, "is_breaking=$is_breaking")
                  println(io, "subject=$subject")
                  println(io, "skip_reason=$skip_reason")
              end
          end

      - name: "Summary (skipped)"
        if: steps.meta.outputs.route == 'none'
        run: |
          {
            echo "### Registrator"
            echo "- Skipped: ${{ steps.meta.outputs.skip_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- General registry path ----

      - name: "Compose Registrator commit comment"
        if: steps.meta.outputs.route == 'general'
        shell: bash
        env:
          IS_BREAKING: ${{ steps.meta.outputs.is_breaking }}
          SUBJECT: ${{ steps.meta.outputs.subject }}
          NEW_VERSION: ${{ steps.meta.outputs.new_version }}
          SUBDIR: ${{ inputs.subdir }}
        run: |
          {
            if [ -n "$SUBDIR" ]; then
              echo "@JuliaRegistrator register subdir=$SUBDIR"
            else
              echo "@JuliaRegistrator register"
            fi
            if [ "$IS_BREAKING" = "true" ]; then
              echo ""
              echo "Release notes:"
              echo "- breaking: $SUBJECT (v$NEW_VERSION)"
            fi
          } > registrator-comment.md

      - name: "Trigger Registrator (General)"
        if: steps.meta.outputs.route == 'general'
        id: cc
        uses: peter-evans/commit-comment@v4
        with:
          token: ${{ secrets.REGISTRATOR_PAT || github.token }}
          sha: ${{ env.TARGET_SHA }}
          body-path: registrator-comment.md

      - name: "Summary (General)"
        if: steps.meta.outputs.route == 'general'
        run: |
          {
            echo "### Registrator"
            echo "- Route: General"
            echo "- Version: v${{ steps.meta.outputs.new_version }}"
            echo "- Commit: \`${{ env.TARGET_SHA }}\`"
            echo "- Commit comment id: ${{ steps.cc.outputs.comment-id }}"
            if [ "${{ steps.meta.outputs.is_breaking }}" = "true" ]; then
              echo "- Marked as breaking"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- Local registry path ----

      - name: "Validate local registry input"
        if: steps.meta.outputs.route == 'local' && inputs.localregistry == ''
        run: |
          echo "inputs.localregistry is required when the package is not in General." >&2
          exit 1

      - name: "Validate REGISTRATOR_PAT (local registry)"
        if: steps.meta.outputs.route == 'local'
        env:
          REGISTRATOR_PAT: ${{ secrets.REGISTRATOR_PAT }}
        shell: bash
        run: |
          if [ -z "$REGISTRATOR_PAT" ]; then
            echo "secrets.REGISTRATOR_PAT is required for the local registry path (checkout + PR)." >&2
            exit 1
          fi

      - name: "Checkout local registry"
        if: steps.meta.outputs.route == 'local'
        uses: actions/checkout@v6
        with:
          repository: "${{ inputs.localregistry }}"
          path: registry
          token: "${{ secrets.REGISTRATOR_PAT }}"

      # Resolve the PAT owner so the registry-PR commit author and committer
      # both match the authenticating identity. Without this, peter-evans
      # below defaults the author to the workflow-trigger commit author and
      # the committer to github-actions[bot].
      - name: "Detect token owner"
        if: steps.meta.outputs.route == 'local'
        id: token-owner
        env:
          GH_TOKEN: ${{ secrets.REGISTRATOR_PAT }}
        shell: bash
        run: |
          json=$(gh api user 2>/dev/null || echo '{}')
          login=$(echo "$json" | jq -r '.login // ""')
          id=$(echo "$json" | jq -r '.id // ""')
          if [ -n "$login" ]; then
            name="$login"
            email="${id}+${login}@users.noreply.github.com"
          else
            name="github-actions[bot]"
            email="github-actions[bot]@users.noreply.github.com"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "email=$email" >> "$GITHUB_OUTPUT"

      - name: "Compose PR metadata (local registry)"
        if: steps.meta.outputs.route == 'local'
        id: local_pr
        env:
          PKG_NAME: ${{ steps.meta.outputs.pkg_name }}
          PKG_UUID: ${{ steps.meta.outputs.uuid }}
          PKG_VERSION: ${{ steps.meta.outputs.new_version }}
          IS_BREAKING: ${{ steps.meta.outputs.is_breaking }}
          SUBJECT: ${{ steps.meta.outputs.subject }}
        shell: julia --color=yes {0}
        run: |
          using TOML

          reg = TOML.parsefile("registry/Registry.toml")
          pkgs = get(reg, "packages", Dict{String,Any}())
          is_new_pkg = !haskey(pkgs, ENV["PKG_UUID"])

          kind = is_new_pkg ? "New package" : "New version"
          title = "$kind: $(ENV["PKG_NAME"]) v$(ENV["PKG_VERSION"])"

          body = "Commit: $(ENV["TARGET_SHA"])"
          if ENV["IS_BREAKING"] == "true"
              body *= "\n\nRelease notes:\n- breaking: $(ENV["SUBJECT"]) (v$(ENV["PKG_VERSION"]))"
          end

          open(ENV["GITHUB_OUTPUT"], "a") do io
              println(io, "title=$title")
              println(io, "body<<EOF")
              print(io, body)
              println(io)
              println(io, "EOF")
          end

      - name: "Update local registry"
        if: steps.meta.outputs.route == 'local'
        env:
          SUBDIR: ${{ inputs.subdir }}
        shell: julia --color=yes {0}
        run: |
          import Pkg
          Pkg.activate(mktempdir())
          Pkg.add(Pkg.PackageSpec(name="LocalRegistry",
                                  uuid="89398ba2-070a-4b16-a995-9893c55d93cf",
                                  version="0.5.7"))
          using LocalRegistry
          subdir = get(ENV, "SUBDIR", "")
          pkg_path = isempty(subdir) ? "./package" : joinpath("./package", subdir)
          register(pkg_path; registry="./registry", commit=false, push=false)

      - name: "Create PR to registry"
        if: steps.meta.outputs.route == 'local'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          path: registry
          branch: "registrator/${{ github.repository }}"
          title: "${{ steps.local_pr.outputs.title }}"
          body: "${{ steps.local_pr.outputs.body }}"
          token: "${{ secrets.REGISTRATOR_PAT }}"
          delete-branch: true
          author: "${{ steps.token-owner.outputs.name }} <${{ steps.token-owner.outputs.email }}>"
          committer: "${{ steps.token-owner.outputs.name }} <${{ steps.token-owner.outputs.email }}>"

      - name: "Summary (local registry)"
        if: steps.meta.outputs.route == 'local'
        run: |
          {
            echo "### Registrator"
            echo "- Route: Local registry (\`${{ inputs.localregistry }}\`)"
            echo "- Version: v${{ steps.meta.outputs.new_version }}"
            if [ -n "${{ steps.cpr.outputs.pull-request-url }}" ]; then
              echo "- PR (${{
                steps.cpr.outputs.pull-request-operation
              }}): ${{ steps.cpr.outputs.pull-request-url }}"
            else
              echo "- PR: none (no changes)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "React to comment"
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.REGISTRATOR_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST -f content='+1'
