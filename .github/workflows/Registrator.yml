name: "Registrator"

on:
  workflow_call:
    inputs:
      julia-version:
        description: "Julia version"
        required: false
        default: "1"
        type: string
      localregistry:
        description: "Local registry repo (owner/name) used when the package is not in General."
        required: false
        default: ""
        type: string
      trigger:
        description: "Comment trigger phrase for on-demand registration"
        default: "/register"
        required: false
        type: string
      subdir:
        description: "Subdirectory containing the package's Project.toml, relative to the repo root. Default empty means register the root package. Set to e.g. 'NDTensors' to register an in-tree subpackage; the workflow then reads `package/<subdir>/Project.toml` and posts `@JuliaRegistrator register subdir=<subdir>` so JuliaRegistrator picks up the sub-package correctly."
        default: ""
        required: false
        type: string
    secrets:
      # Only needed for the local-registry path (checkout + PR). Not needed for General.
      REGISTRATOR_PAT:
        required: false

jobs:
  registrator:
    name: "Registrator"
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' || (
        github.event.issue.pull_request == null &&
        contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.comment.author_association) &&
        contains(github.event.comment.body, inputs.trigger)
      )

    # Writes (commit comment for General path, registry PR for local
    # path, comment reaction) all use REGISTRATOR_PAT, so this job
    # itself only needs read scope on the GITHUB_TOKEN. The PAT bypasses
    # GITHUB_TOKEN's permissions for the actual write operations.
    permissions:
      contents: read
      pull-requests: read

    env:
      # Prefer the commit that landed on the base branch when available (merged PRs),
      # otherwise PR head SHA, otherwise github.sha.
      TARGET_SHA: ${{ (github.event.pull_request && github.event.pull_request.merged && github.event.pull_request.merge_commit_sha) || (github.event.pull_request && github.event.pull_request.head.sha) || github.sha }}

    steps:
      - name: "Get target SHA from comment"
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TRIGGER: ${{ inputs.trigger }}
        run: |
          BODY=$(jq -r '.comment.body' "$GITHUB_EVENT_PATH")
          SHA=$(printf '%s' "$BODY" | grep -oP "${TRIGGER}"'\s+\K[0-9a-f]{7,40}' | head -1 || true)
          if [ -n "$SHA" ]; then
            FULL_SHA=$(gh api "repos/$REPO/commits/$SHA" --jq '.sha')
            echo "TARGET_SHA=$FULL_SHA" >> "$GITHUB_ENV"
          fi

      - name: "Setup Julia ${{ inputs.julia-version }}"
        uses: julia-actions/setup-julia@v3
        with:
          version: "${{ inputs.julia-version }}"
          arch: ${{ runner.arch }}

      - uses: julia-actions/cache@v3
        with:
          delete-old-caches: false
          # See the comment in `Tests.yml`: don't cache a failed job's
          # half-installed depot, which would otherwise poison the cache.
          save-always: false

      - name: "Checkout package"
        uses: actions/checkout@v6
        with:
          path: package
          fetch-depth: 0
          ref: ${{ env.TARGET_SHA }}

      - name: "Decide route (General vs local) + validate version bump"
        id: meta
        uses: ITensor/ITensorActions/.github/actions/version-helpers@da93b046addb1a99cb6ab9461e79d35db51bb8a2
        with:
          mode: registrator-meta
          package-path: package
          subdir: ${{ inputs.subdir }}
          old-ref: ${{ github.event.before }}
          force: ${{ github.event_name == 'issue_comment' }}

      - name: "Summary (skipped)"
        if: steps.meta.outputs.route == 'none'
        run: |
          {
            echo "### Registrator"
            echo "- Skipped: ${{ steps.meta.outputs.skip_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Dispatch registration"
        if: steps.meta.outputs.route != 'none'
        id: dispatch
        uses: ITensor/ITensorActions/.github/actions/register-version@da93b046addb1a99cb6ab9461e79d35db51bb8a2
        with:
          route: ${{ steps.meta.outputs.route }}
          localregistry: ${{ inputs.localregistry }}
          registrator-pat: ${{ secrets.REGISTRATOR_PAT }}
          target-sha: ${{ env.TARGET_SHA }}
          package-name: ${{ steps.meta.outputs.pkg_name }}
          package-uuid: ${{ steps.meta.outputs.uuid }}
          package-version: ${{ steps.meta.outputs.new_version }}
          is-breaking: ${{ steps.meta.outputs.is_breaking }}
          subject: ${{ steps.meta.outputs.subject }}
          subdir: ${{ inputs.subdir }}

      - name: "React to comment"
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.REGISTRATOR_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST -f content='+1'
