name: "Reusable Tests Workflow"

on:
  workflow_call:
    inputs:
      julia-version:
        description: "Julia version"
        default: "1"
        required: false
        type: string
      julia-arch:
        description: "Architecture of Julia to be used"
        required: false
        type: string
      project:
        description: "The value is passed to Julia's `--project` flag"
        default: '@.'
        required: false
        type: string
      group:
        description: "The 'GROUP' of tests that need to be run. This will requires an ENV `GROUP` to be (conditionally) defined within your package tests as well to selectively run groups of tests"
        default: ""
        required: false
        type: string
      self-hosted:
        description: "Run the job needs on a self hosted machine"
        default: false
        required: false
        type: boolean
      os:
        description: "The machine configuration on which the job needs to be run"
        default: "ubuntu-latest"
        required: false
        type: string
      nthreads:
        description: "The number of Julia threads"
        default: 1
        required: false
        type: number
      cache:
        description: "Use the julia-actions/cache action for caching"
        default: true
        required: false
        type: boolean
      buildpkg:
        description: "Use the julia-actions/buildpkg action to build the package first"
        default: true
        required: false
        type: boolean
      localregistry:
        type: string
        required: false
        description: "Add local registries hosted on GitHub. Specified by providing the url (https/ssh) to the repositories as a newline (\n) seperated list. User is responsible for setting up the necessary SSH-Keys to access the repositories if necessary."
        default: ""
      coverage:
        description: "Collect and generate code coverage-related information"
        default: true
        required: false
        type: boolean
      coverage-directories:
        description: "Comma-separated list of directories where the julia-processcoverage action will look for coverage information (e.g. `src,examples`)"
        default: "src,ext"
        required: false
        type: string
      julia-runtest-depwarn:
        description: "Value of the --depwarn flag while running Julia"
        default: "yes"
        required: false
        type: string
      continue-on-error:
        description: "Prevent the workflow run from failing if/when the job fails"
        required: false
        type: boolean
      timeout-minutes:
        description: "The maximum time in minutes that the job can run"
        default: 60
        required: false
        type: number
      run-all-on-draft:
        description: "When true, run the full test matrix even on draft PRs"
        default: false
        required: false
        type: boolean
      apt-packages:
        description: "Space-separated list of apt packages to install on Ubuntu runners before Julia setup (e.g. 'xvfb libgl1' for GUI-dependent tests). Ignored on non-Linux runners."
        default: ""
        required: false
        type: string
      test-prefix:
        description: "Value inserted in front of the julia command when running tests (passed through to julia-actions/julia-runtest's `prefix` input). Example: 'xvfb-run -a -s \"-screen 0 1024x768x24\" ' for GUI tests."
        default: ""
        required: false
        type: string
      extra-env:
        description: "Multi-line KEY=VALUE pairs to export into the job's environment (via $GITHUB_ENV) before the test step. Example: 'JULIA_REFERENCETESTS_UPDATE=true'."
        default: ""
        required: false
        type: string
      upload-artifacts-path:
        description: "Path (file or directory) to upload as an artifact after the test step. Uploads always run (on success or failure) when set. Artifact name is auto-generated per os/julia-version."
        default: ""
        required: false
        type: string
      check-compat-bounds:
        description: "After instantiating, fail if any workspace compat entry is resolved to a version below its compat upper bound (indicates a transitive dependency is holding the workspace back from its declared bound)."
        default: true
        required: false
        type: boolean
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:
  tests:
    name: "Julia ${{ inputs.julia-version }} - ${{ inputs.self-hosted && 'self-hosted' || inputs.os }} ${{ inputs.group != '' && format(' - {0}', inputs.group) || '' }}"
    if: >-
      !github.event.pull_request.draft
      || inputs.run-all-on-draft
      || (inputs.os == 'ubuntu-latest' && inputs.julia-version == '1')
    continue-on-error: ${{ inputs.continue-on-error || inputs.julia-version == 'nightly' }}
    runs-on: "${{ inputs.self-hosted && 'self-hosted' || inputs.os }}"
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@v4

      - name: "Install apt packages"
        if: "${{ inputs.apt-packages != '' && runner.os == 'Linux' }}"
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ inputs.apt-packages }}

      - name: "Setup Julia ${{ inputs.julia-version }}"
        uses: julia-actions/setup-julia@v2
        with:
          version: "${{ inputs.julia-version }}"
          arch: "${{ inputs.julia-arch || runner.arch }}"

      - uses: julia-actions/cache@v2
        if: "${{ inputs.cache }}"
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"

      - uses: julia-actions/julia-buildpkg@v1
        if: "${{ inputs.buildpkg }}"
        with:
          localregistry: "${{ inputs.localregistry }}"

      - name: "Check compat upper bounds"
        if: "${{ inputs.check-compat-bounds }}"
        uses: ITensor/ITensorActions/.github/actions/check-compat-bounds@main
        with:
          workspace-root: "."

      - name: "Export extra environment variables"
        if: "${{ inputs.extra-env != '' }}"
        shell: "bash"
        run: |
          echo "${{ inputs.extra-env }}" >> "$GITHUB_ENV"

      - name: "Run tests ${{ inputs.self-hosted && '' || format('on {0}', inputs.os) }} with Julia v${{ inputs.julia-version }}"
        uses: julia-actions/julia-runtest@v1
        with:
          project: "${{ inputs.project }}"
          depwarn: "${{ inputs.julia-runtest-depwarn }}"
          coverage: "${{ inputs.coverage }}"
          prefix: "${{ inputs.test-prefix }}"
        env:
          GROUP: "${{ inputs.group }}"
          JULIA_NUM_THREADS: "${{ inputs.nthreads }}"

      - name: "Upload artifacts"
        if: "${{ always() && inputs.upload-artifacts-path != '' }}"
        uses: actions/upload-artifact@v4
        with:
          name: "artifacts-${{ inputs.os }}-julia-${{ inputs.julia-version }}${{ inputs.group != '' && format('-{0}', inputs.group) || '' }}"
          path: "${{ inputs.upload-artifacts-path }}"

      - uses: julia-actions/julia-processcoverage@v1
        if: "${{ inputs.coverage }}"
        with:
          directories: "${{ inputs.coverage-directories }}"

      - name: "Report Coverage with Codecov"
        uses: codecov/codecov-action@v5
        if: "${{ inputs.coverage }}"
        with:
          files: lcov.info
          token: "${{ secrets.CODECOV_TOKEN }}"
          fail_ci_if_error: false
